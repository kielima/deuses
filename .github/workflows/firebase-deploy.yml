name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  hosting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEUSES_APP }}
          projectId: deuses-app
          channelId: live

  # Deploy das regras é um job independente: não pode ser bloqueado por uma
  # falha (muitas vezes espúria) do passo de Hosting.
  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firestore rules (REST API)
        env:
          FIREBASE_SERVICE_ACCOUNT_DEUSES_APP: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEUSES_APP }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_DEUSES_APP" > "$RUNNER_TEMP/sa.json"
          node scripts/deploy-firestore-rules.mjs "$RUNNER_TEMP/sa.json" deuses-app firestore.rules
