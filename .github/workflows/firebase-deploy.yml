name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  hosting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEUSES_APP }}
          projectId: deuses-app
          channelId: live

  # NOTA: o deploy automático das regras foi removido porque a service account
  # FIREBASE_SERVICE_ACCOUNT_DEUSES_APP não tem a permissão
  # firebaserules.rulesets.create (403 IAM_PERMISSION_DENIED).
  # Para reativar: conceder à SA o papel "Firebase Rules Admin" no IAM e voltar
  # a adicionar um job que corra scripts/deploy-firestore-rules.mjs.
  # Em alternativa, publicar firestore.rules manualmente pelo Firebase Console.
